name: CTO Code Review
on:
  pull_request:
    types: [review_requested]
jobs:
  review:
    if: github.event.requested_reviewer.login == 'darrencto'
    runs-on: self-hosted
    steps:
      - name: Trigger CTO Agent Review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCLAW_TOKEN: "0c79daef178187ffcac78f80520dc25f"
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          REPO="${{ github.repository }}"

          MESSAGE="[cursor-review] PR #${PR_NUMBER} 需要 Code Review

仓库: ${REPO}
标题: ${PR_TITLE}
分支: ${PR_BRANCH}
链接: ${PR_URL}

请按照 cursor-review skill 执行审查，完成后 approve 并 merge。"

          curl -s -X POST http://127.0.0.1:12579/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OPENCLAW_TOKEN}" \
            -d "{\"model\": \"cto\", \"messages\": [{\"role\": \"user\", \"content\": $(echo "$MESSAGE" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}]}"
