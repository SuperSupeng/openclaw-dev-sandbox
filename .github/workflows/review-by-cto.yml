name: CTO Code Review
on:
  pull_request:
    types: [labeled]
jobs:
  review:
    if: github.event.label.name == 'cto-review'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run CTO Review Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          /home/admin/.local/bin/agent -p --force --trust \
            --workspace /home/admin/openclaw-dev-sandbox \
            "[cursor-review] PR #${{ github.event.pull_request.number }} repo:AGI-Villa/openclaw-dev-sandbox url:${{ github.event.pull_request.html_url }} branch:${{ github.event.pull_request.head.ref }} see:skills/cursor-dev/SKILL.md"
