name: CTO Code Review
on:
  pull_request:
    types: [labeled]
jobs:
  review:
    if: github.event.label.name == 'cto-review'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run CTO Review Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          /home/admin/.local/bin/agent -p --force --trust \
            --workspace /home/admin/openclaw-dev-sandbox \
            "[cursor-review] PR #${PR_NUM} Repo: AGI-Villa/openclaw-dev-sandbox PR: ${PR_URL} Branch: ${PR_BRANCH} See skills/cursor-dev/SKILL.md"
