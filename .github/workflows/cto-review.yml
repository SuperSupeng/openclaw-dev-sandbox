name: CTO Code Review

on:
  pull_request:
    types: [review_requested, opened, reopened, synchronize]

jobs:
  cto-review:
    if: "github.event.requested_reviewer.login == 'darrencto' || contains(toJSON(github.event.pull_request.requested_reviewers), 'darrencto')"
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run CTO Review Agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"

          echo "CTO Review triggered: PR #${PR_NUM}"

          /home/admin/.local/bin/agent \
            -p \
            --force \
            --trust \
            --workspace /home/admin/openclaw-dev-sandbox \
            "[cursor-review] PR #${PR_NUM}

仓库：AGI-Villa/openclaw-dev-sandbox
PR URL：${PR_URL}
PR 分支：${PR_BRANCH}

详细执行步骤见工作区 skills/cursor-dev/SKILL.md。"
